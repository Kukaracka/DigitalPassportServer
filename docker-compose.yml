services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: digitalpassport
      POSTGRES_PASSWORD: digitalpassportpass
      POSTGRES_DB: digitalpassportdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    ports:
      - "9000:9000" 
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: strongpassword
      MINIO_BROWSER_REDIRECT_URL: https://194.150.220.138:9001
      MINIO_SERVER_URL: https://194.150.220.138:9000
    volumes:
      - minio_data:/data
      - ./ssl:/root/.minio/certs
    command: server /data --console-address ":9001" --address ":9000"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
      - minio
    environment:
      DATABASE_URL: postgresql+asyncpg://digitalpassport:digitalpassportpass@db:5432/digitalpassportdb

      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_URL: https://194.150.220.138:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: strongpassword
      MINIO_BUCKET: avatars
      MINIO_SECURE: "true"
      
      MINIO_CERT_CHECK: "false"

    volumes:
      - ./src:/app/src
      - ./ssl:/app/ssl
    ports:
      - "8443:8443"
    command: [
      "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8443",
      "--ssl-keyfile", "/app/ssl/key.pem",
      "--ssl-certfile", "/app/ssl/cert.pem",
      "--reload"
    ]

volumes:
  pgdata:
  minio_data:
