services:
  db:
    image: postgres:15
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data
      - ./ssl:/root/.minio/certs
    command: server /data --console-address ":9001" --address ":9000"
    networks:
      - app-network

  backend:
    image: ghcr.io/kukaracka/digitalpassportserver:latest
    env_file:
      - .env 
    depends_on:
      - db
      - minio
    command: [
      "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"
    ]
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - db
      - minio
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  minio_data:
