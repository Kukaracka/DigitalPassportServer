version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: digitalpassport
      POSTGRES_PASSWORD: digitalpassportpass
      POSTGRES_DB: digitalpassportdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    ports:
      - "9000:9000"   # S3 API (HTTPS)
      - "9001:9001"   # Web console (HTTPS)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: strongpassword
      # Включаем HTTPS
      MINIO_BROWSER_REDIRECT_URL: https://194.150.220.138:9001
      MINIO_SERVER_URL: https://194.150.220.138:9000
    volumes:
      - minio_data:/data
      - ./ssl:/root/.minio/certs  # Монтируем сертификаты для MinIO
    command: server /data --console-address ":9001" --address ":9000"
    # Для самоподписанных сертификатов добавляем:
    # command: server /data --console-address ":9001" --address ":9000" --certs-dir /root/.minio/certs

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      - db
      - minio
    environment:
      DATABASE_URL: postgresql+asyncpg://digitalpassport:digitalpassportpass@db:5432/digitalpassportdb

      # S3 / MinIO настройки - ВАЖНО: теперь HTTPS
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_URL: https://194.150.220.138:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: strongpassword
      MINIO_BUCKET: avatars
      MINIO_SECURE: "true"  # Включаем HTTPS
      
      # Отключаем проверку сертификата для разработки
      MINIO_CERT_CHECK: "false"

    volumes:
      - ./backend:/app
      - ./ssl:/app/ssl
    ports:
      - "8443:8443"
    command: [
      "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8443",
      "--ssl-keyfile", "/app/ssl/key.pem",
      "--ssl-certfile", "/app/ssl/cert.pem",
      "--reload"
    ]

volumes:
  pgdata:
  minio_data:
